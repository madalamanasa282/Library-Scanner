<button id="startBtn">📚 Scan ISBN</button>

<div id="reader" style="display:none;"></div>

<style>
#startBtn {
    font-size: 24px;
    padding: 15px 30px;
    border-radius: 10px;
}
</style>

<script>
document.getElementById("startBtn").onclick = function() {
    document.getElementById("reader").style.display = "block";

    const scanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: 250 }
    );

    scanner.render((decodedText) => {
        const formUrl =
            "https://docs.google.com/forms/d/e/1FAIpQLSdH-zvSZx9wssgLF1pcBkKyxDoYMCcDwG5SH2_qCmC0ft_xeQ/viewform?usp=pp_url&entry.616904733="
            + encodeURIComponent(decodedText);

        window.location.href = formUrl;
    });
};
</script>
