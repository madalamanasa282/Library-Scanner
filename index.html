<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    #startBtn {
      font-size: 24px;
      padding: 15px 30px;
    }
    #reader {
      display: none;
    }
  </style>
</head>
<body>

<h2>Scan ISBN</h2>

<button id="startBtn">📚 Scan ISBN</button>

<div id="reader"></div>

<script>
document.getElementById("startBtn").addEventListener("click", function () {
    document.getElementById("reader").style.display = "block";

    const scanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: 250 }
    );

    scanner.render(async function(decodedText) {

    scanner.clear(); // Stop scanning

    try {
        const response = await fetch(
            `https://www.googleapis.com/books/v1/volumes?q=isbn:${decodedText}`
        );

        const data = await response.json();

        if (!data.items || data.items.length === 0) {
            document.body.innerHTML += `
                <h3>❌ Not a valid book barcode</h3>
                <button onclick="location.reload()">Scan Another</button>
            `;
            return;
        }

        const book = data.items[0].volumeInfo;

        document.body.innerHTML += `
            <h2>${book.title}</h2>
            <p><b>Author:</b> ${book.authors?.join(", ") || "Unknown"}</p>
            ${
                book.imageLinks?.thumbnail
                ? `<img src="${book.imageLinks.thumbnail}">`
                : ""
            }
            <br><br>
            <button onclick="location.reload()">Scan Another</button>
        `;

    } catch (err) {
        alert("Error looking up book information");
    }
});
});
</script>

</body>
</html>
